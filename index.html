<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Alfred</title>
<meta name="theme-color" content="#f4efe4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Alfred">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=IBM+Plex+Mono:wght@400;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4efe4; --bg2:#ece5d4; --panel:#fbf8f0; --panel2:#f1ebdd;
    --line:#e2d9c6; --line2:#cdc0a6;
    --txt:#292418; --muted:#6e6553; --faint:#a49a82;
    --acc:#3f6f4f; --gold:#b98b2e; --blue:#4a7d9b; --green:#4f8a5f; --orange:#c07a4a;
    --purple:#8d6ba8; --red:#b8543f;
    --ok:#3f8f5f; --bad:#b8543f; --warn:#b98b2e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);font-family:"Public Sans",sans-serif;-webkit-font-smoothing:antialiased}
  body{
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:42px 42px;background-color:var(--bg);
    padding-top:env(safe-area-inset-top);
  }
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(120% 90% at 50% -10%,rgba(63,111,79,.06),transparent 60%);pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 14px 90px}
  header{padding:18px 0 6px}
  .brandrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .logo{font-family:"Fraunces",Georgia,serif;font-weight:800;letter-spacing:-.02em;font-size:22px;line-height:1}
  .logo b{color:var(--gold)}
  .tag{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  .statuspill{margin-left:auto;display:flex;align-items:center;gap:7px;font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line2);border-radius:999px;padding:5px 10px;cursor:pointer;background:none}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .dot.off{background:var(--bad);box-shadow:0 0 8px var(--bad)}
  .dot.pend{background:var(--warn);box-shadow:0 0 8px var(--warn)}
  .dot.gray{background:var(--faint);box-shadow:none}
  .gear{background:none;border:1px solid var(--line2);border-radius:999px;color:var(--muted);width:30px;height:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .gear:hover{color:var(--txt);border-color:var(--acc)}
  nav{display:flex;gap:4px;margin:12px 0 0;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  nav::-webkit-scrollbar{display:none}
  nav button{background:none;border:none;color:var(--muted);font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:13px;padding:11px 13px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s;flex:none}
  nav button:hover{color:var(--txt)}
  nav button.active{color:var(--txt);border-bottom-color:var(--acc)}
  nav button.todo{color:#b8543f}
  nav button.todo.active{color:#a34734;border-bottom-color:#b8543f}
  .navGroup{position:relative;display:inline-flex;flex:none}
  .navGroupBtn{background:none;border:none;color:var(--muted);font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:13px;padding:11px 13px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s;display:inline-flex;align-items:center;gap:5px}
  .navGroupBtn:hover{color:var(--txt)}
  .navGroup.open>.navGroupBtn,.navGroupBtn.on{color:var(--txt);border-bottom-color:var(--acc)}
  .navCaret{font-size:9px;opacity:.65;transition:transform .15s}
  .navGroup.open .navCaret{transform:rotate(180deg)}
  .navMenu{position:fixed;z-index:300;min-width:194px;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:6px;box-shadow:0 14px 34px rgba(46,40,28,.16);display:none;flex-direction:column;gap:2px}
  .navGroup.open>.navMenu{display:flex}
  .navMenu.show{display:flex}
  .navMenu button{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:0!important;color:var(--muted);font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:13px;padding:9px 12px 9px 16px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:.12s;position:relative}
  .navMenu button:hover{background:var(--panel2)}
  .navMenu button.active{background:var(--panel2);color:var(--txt)}
  .navMenu button.active::before{content:"";position:absolute;left:4px;top:7px;bottom:7px;width:2px;border-radius:2px;background:var(--acc)}
  .page{display:none;padding-top:14px}
  .page.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .grid{display:grid;gap:12px}
  .stats{grid-template-columns:repeat(auto-fit,minmax(145px,1fr))}
  .stat{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:14px 15px;position:relative;overflow:hidden}
  .stat::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--acc))}
  .stat .k{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-family:"IBM Plex Mono";font-weight:600;font-size:23px;margin-top:7px;line-height:1}
  .stat .u{font-size:11px;color:var(--faint);margin-top:5px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px}
  .panel h2{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:15px;display:flex;align-items:center;gap:9px}
  .panel h2 .sw{width:11px;height:11px;border-radius:3px;flex:none}
  .panel .hint{font-size:11.5px;color:var(--faint);margin-top:3px;margin-bottom:10px}
  .btn{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:13px;border-radius:10px;padding:10px 15px;border:1px solid var(--line2);background:var(--panel2);color:var(--txt);cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--acc);color:var(--acc)}
  .btn.primary{background:var(--acc);color:#faf6ec;border-color:var(--acc)}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{background:none}
  .btn.sm{padding:6px 10px;font-size:12px}
  .btn.danger:hover{border-color:var(--bad);color:var(--bad)}
  .segbar{display:inline-flex;background:var(--panel2);border:1px solid var(--line2);border-radius:999px;padding:3px;gap:3px;margin:2px 0 10px;max-width:100%;overflow-x:auto;scrollbar-width:none}
  .segbar::-webkit-scrollbar{display:none}
  .segbar button{background:none;border:none;color:var(--muted);font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:12px;padding:6px 14px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap}
  .segbar button:hover{color:var(--txt)}
  .segbar button.active{background:var(--acc);color:#faf6ec}
  .pill{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:999px;white-space:nowrap}
  .pill.ok{background:rgba(63,143,95,.13);color:#2e7247;border:1px solid rgba(63,143,95,.4)}
  .pill.warn{background:rgba(185,139,46,.13);color:#8f6a1d;border:1px solid rgba(185,139,46,.4)}
  .pill.bad{background:rgba(184,84,63,.13);color:#a34734;border:1px solid rgba(184,84,63,.45)}
  .pill.mut{background:var(--panel2);color:var(--muted);border:1px solid var(--line2)}
  .pill.acc{background:rgba(63,111,79,.11);color:var(--acc);border:1px solid rgba(63,111,79,.35)}
  .rowBox{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-top:9px;transition:.15s}
  .rowBox:hover{border-color:var(--acc)}
  .rowBox.dim{opacity:.55}
  .row{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
  .chev{color:var(--faint);font-size:11px;transition:transform .15s;flex:none}
  .rowBox.open .chev{transform:rotate(180deg)}
  .rDet{display:none;padding:0 14px 12px;font-size:13.5px;line-height:1.65}
  .rowBox.open .rDet{display:block;animation:fade .2s ease}
  .rDetL{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:8px 0 3px}
  .rDetB{white-space:pre-wrap}
  .editBtn{flex:none;width:30px;height:30px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--muted);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:.12s}
  .editBtn:hover{border-color:var(--acc);color:var(--acc)}
  .chk{flex:none;width:24px;height:24px;border-radius:7px;border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:transparent;transition:.15s}
  .chk.done{background:var(--ok);border-color:var(--ok);color:#faf6ec}
  .rinfo{min-width:0;flex:1}
  .rinfo .t{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:13.5px;overflow-wrap:anywhere}
  .rinfo .s{font-family:"IBM Plex Mono";font-size:11px;margin-top:2px;color:var(--muted);overflow-wrap:anywhere}
  .rright{margin-left:auto;display:flex;align-items:center;gap:8px;flex:none}
  .qtyStep{display:inline-flex;align-items:center;gap:6px}
  .qtyBtn{width:28px;height:28px;border-radius:7px;border:1px solid var(--line2);background:var(--panel2);color:var(--txt);font-size:15px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0}
  .qtyBtn:hover{border-color:var(--acc);color:var(--acc)}
  .qtyVal{min-width:28px;text-align:center;font-family:"IBM Plex Mono";font-size:14px;font-weight:600}
  .ghead{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:14px;color:var(--txt);margin:20px 2px 4px;padding-bottom:6px;border-bottom:2px solid var(--line2)}
  .ghead:first-child{margin-top:4px}
  .ghead .gsub{font-family:"IBM Plex Mono";font-size:10.5px;color:var(--muted);font-weight:400;margin-left:7px}
  .empty{padding:36px 16px;text-align:center;color:var(--faint);font-size:13px;line-height:1.6}
  .fab{position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:40;box-shadow:0 8px 24px rgba(46,40,28,.22);width:54px;height:54px;border-radius:16px;font-size:24px;justify-content:center;padding:0}
  .overlay{position:fixed;inset:0;background:rgba(46,40,28,.42);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:20px 12px calc(20px + env(safe-area-inset-bottom));overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line2);border-radius:18px;width:100%;max-width:520px;padding:20px;margin:auto}
  .modal h3{font-family:"Fraunces",Georgia,serif;font-weight:800;font-size:18px}
  .modal .close{float:right;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .frow.one{grid-template-columns:1fr}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:10.5px;color:var(--muted);font-family:"IBM Plex Mono";letter-spacing:.03em;text-transform:uppercase}
  .field input,.field textarea,.field select{background:var(--bg2);border:1px solid var(--line2);border-radius:8px;color:var(--txt);padding:9px 10px;font-family:"IBM Plex Mono";font-size:14px;width:100%;-webkit-appearance:none}
  .field textarea{min-height:74px;resize:vertical;font-family:"Public Sans",sans-serif;line-height:1.5}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--acc)}
  .modal .foot{display:flex;gap:10px;margin-top:18px}
  .modal .foot .spacer{flex:1}
  .note{font-size:11.5px;color:var(--faint);margin-top:10px;line-height:1.55}
  /* menu grid */
  .menuGrid{display:grid;grid-template-columns:74px 1fr 1fr;gap:7px;margin-top:10px}
  .menuGrid .mh{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);align-self:center}
  .menuGrid .mday{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:12.5px;color:var(--txt);align-self:center}
  .menuGrid .mday .md{font-family:"IBM Plex Mono";font-size:9.5px;color:var(--faint);font-weight:400;display:block}
  .menuCell{background:var(--bg2);border:1px solid var(--line2);border-radius:9px;color:var(--txt);padding:9px 10px;font-family:"Public Sans",sans-serif;font-size:13.5px;width:100%;min-height:44px;resize:none;line-height:1.4;overflow:hidden}
  .menuCell:focus{outline:none;border-color:var(--acc)}
  .menuCell.today{border-color:rgba(63,111,79,.5)}
  /* overview */
  .ovHead{font-family:"Fraunces",Georgia,serif;font-weight:800;font-size:24px;margin:16px 2px 0}
  .ovSub{font-family:"IBM Plex Mono";font-size:10.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin:4px 2px 0}
  .ovCard{cursor:pointer;transition:.15s}
  .ovCard:hover{border-color:var(--acc)}
  .ovRow{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px;align-items:baseline}
  .ovRow:last-child{border-bottom:0}
  .ovRow .d{font-family:"IBM Plex Mono";font-size:10.5px;color:var(--muted);flex:none;min-width:52px}
  .ovRow .d.hot{color:var(--bad);font-weight:600}
  .ovMore{font-family:"IBM Plex Mono";font-size:11px;color:var(--acc);margin-top:9px}
  .ovBody{font-size:13.5px;line-height:1.6;margin-top:6px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  /* day picker */
  .dayPick{display:flex;gap:6px;flex-wrap:wrap}
  .dayBtn{width:44px;height:36px;border-radius:8px;border:1px solid var(--line2);background:var(--bg2);color:var(--muted);font-family:"IBM Plex Mono";font-size:11px;cursor:pointer;transition:.12s}
  .dayBtn.on{background:var(--acc);border-color:var(--acc);color:#faf6ec;font-weight:600}
  /* weekly timetable */
  .ttWrap{overflow-x:auto;margin-top:8px;padding-bottom:4px}
  .tt{display:grid;grid-template-columns:46px repeat(7,minmax(76px,1fr));gap:2px;min-width:620px}
  .ttHead{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:12px;text-align:center;padding:3px 0}
  .ttHead.today{color:var(--acc)}
  .ttTime{grid-column:1;font-family:"IBM Plex Mono";font-size:9px;color:var(--faint);text-align:right;padding-right:6px;transform:translateY(-6px)}
  .ttCell{border-top:1px solid var(--line)}
  .ttBlock{border-radius:7px;padding:3px 6px;overflow:hidden;cursor:pointer;border-left:3px solid var(--bc,var(--acc));background:var(--panel2);box-shadow:0 1px 4px rgba(46,40,28,.08)}
  .ttBlock .n{font-weight:600;font-family:"Public Sans",sans-serif;font-size:10.5px;line-height:1.2}
  .ttBlock .t{font-family:"IBM Plex Mono";font-size:8.5px;color:var(--muted);margin-top:1px}
  /* finances */
  .ftWrap{overflow-x:auto;margin-top:10px;border:1px solid var(--line);border-radius:12px}
  table.ft{border-collapse:collapse;width:100%;font-size:12.5px;min-width:560px}
  table.ft th{font-family:"IBM Plex Mono";font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);background:var(--panel2);padding:8px 10px;text-align:right;white-space:nowrap}
  table.ft td{font-family:"IBM Plex Mono";padding:8px 10px;text-align:right;border-top:1px solid var(--line);white-space:nowrap}
  table.ft th:first-child,table.ft td:first-child{text-align:left;position:sticky;left:0;background:var(--panel)}
  table.ft th:first-child{background:var(--panel2)}
  table.ft td.ed{cursor:pointer}
  table.ft td.ed:hover{background:var(--panel2)}
  table.ft tr.tot td{border-top:2px solid var(--line2);font-weight:600}
  .neg{color:var(--bad)} .pos{color:#2e7247}
  .finRow{display:flex;align-items:baseline;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .finRow:hover{background:var(--panel2)}
  .finRow:last-child{border-bottom:0}
  .finRow .n{font-size:13.5px}
  .finRow .sub{font-family:"IBM Plex Mono";font-size:10px;color:var(--faint)}
  .finRow .v{margin-left:auto;font-family:"IBM Plex Mono";font-size:13.5px}
  .finRow .v2{font-family:"IBM Plex Mono";font-size:10.5px;color:var(--muted)}
  .finTot{display:flex;gap:10px;padding:10px 2px 2px;border-top:2px solid var(--line2);margin-top:2px;font-weight:600}
  .finTot .n{font-size:13px;font-family:"Fraunces",Georgia,serif}
  .finTot .v{margin-left:auto;font-family:"IBM Plex Mono";font-size:14px}
  /* brief */
  .briefBody{font-size:14px;line-height:1.7;white-space:pre-wrap;margin-top:10px}
  /* lock screen */
  #lock{position:fixed;inset:0;z-index:2000;background:var(--bg);background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:42px 42px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:20px}
  #lock.show{display:flex}
  #lock .llogo{font-family:"Fraunces",Georgia,serif;font-weight:800;font-size:30px;letter-spacing:-.02em}
  #lock .llogo b{color:var(--gold)}
  #lock .lmsg{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .dots{display:flex;gap:14px}
  .pdot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--line2);transition:.12s}
  .pdot.on{background:var(--acc);border-color:var(--acc);box-shadow:0 0 10px rgba(63,111,79,.4)}
  .dots.shake{animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
  .pad{display:grid;grid-template-columns:repeat(3,72px);gap:14px}
  .pkey{height:72px;border-radius:50%;border:1px solid var(--line2);background:rgba(251,248,240,.85);color:var(--txt);font-family:"IBM Plex Mono";font-size:24px;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center}
  .pkey:active{background:var(--panel2);border-color:var(--acc)}
  .pkey.ghost{border:none;background:none;font-size:20px;color:var(--muted)}
  /* settings */
  .setRow{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:center;flex-wrap:wrap}
  .setRow:last-child{border-bottom:none}
  .setRow .l{color:var(--muted)}
  .setRow .v{font-family:"IBM Plex Mono";font-size:12px}
  @media(max-width:560px){
    .stat .v{font-size:20px}
    .field input,.field textarea,.field select,.menuCell{font-size:16px}
    .frow{grid-template-columns:1fr}
    .menuGrid{grid-template-columns:64px 1fr 1fr}
    .pad{grid-template-columns:repeat(3,64px)}
    .pkey{height:64px}
  }
</style>
</head>
<body>

<div id="lock">
  <div class="llogo">ALFRED<b>.</b></div>
  <div class="lmsg" id="lockMsg">ENTER PIN</div>
  <div class="dots" id="lockDots"><span class="pdot"></span><span class="pdot"></span><span class="pdot"></span><span class="pdot"></span></div>
  <div class="pad" id="lockPad"></div>
</div>

<div class="wrap">
  <header>
    <div class="brandrow">
      <div>
        <div class="logo">ALFRED<b>.</b></div>
        <div class="tag">Personal life console</div>
      </div>
      <button class="statuspill" id="pill" title="Sync status"><span class="dot gray" id="pillDot"></span><span id="pillTxt">local</span></button>
      <button class="gear" id="gearBtn" title="Settings">⚙</button>
    </div>
  </header>
  <nav id="nav"></nav>
  <main id="pages"></main>
</div>

<button class="btn primary fab" id="fab" style="display:none">+</button>
<div class="navMenu" id="navFly"></div>

<div class="overlay" id="modalOv"><div class="modal">
  <button class="close" onclick="closeModal()">×</button>
  <h3 id="mTitle">Add</h3>
  <div id="mBody"></div>
  <div class="foot">
    <button class="btn danger ghost" id="mDel" style="display:none">Delete</button>
    <span class="spacer"></span>
    <button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn primary" id="mSave">Save</button>
  </div>
</div></div>

<div class="overlay" id="setOv"><div class="modal">
  <button class="close" onclick="ov('setOv',0)">×</button>
  <h3>Settings</h3>
  <div style="margin-top:12px">
    <div class="setRow"><span class="l">Cloud sync</span><span class="v" id="setSync">—</span></div>
    <div class="setRow"><span class="l">Last sync</span><span class="v" id="setLast">—</span></div>
    <div class="setRow"><span class="l">Pending changes</span><span class="v" id="setPend">—</span></div>
    <div class="setRow"><span class="l">Items stored</span><span class="v" id="setCount">—</span></div>
  </div>
  <div class="frow one">
    <div class="field"><label>Supabase URL</label><input id="cfgUrl" placeholder="https://xxxx.supabase.co"></div>
    <div class="field"><label>Supabase key</label><input id="cfgKey" placeholder="sb_publishable_… / anon key"></div>
    <div class="field"><label>Sync secret</label><input id="cfgSec" placeholder="private access secret"></div>
  </div>
  <div class="foot" style="margin-top:14px;flex-wrap:wrap">
    <button class="btn sm" id="cfgSave">Save sync config</button>
    <button class="btn sm" id="pinChange">Change PIN</button>
    <button class="btn sm" id="expBtn">Export backup</button>
    <button class="btn sm" id="impBtn">Import</button>
    <input type="file" id="impFile" accept=".json" style="display:none">
  </div>
  <div class="note">Alfred works fully offline — everything is saved on this device instantly. When online it syncs to your private cloud so your phone and Mac stay in step. Latest edit wins.</div>
</div></div>

<script>
/* ---------------- helpers ---------------- */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=n=>{n=+n||0;return (n<0?'-$':'$')+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:2})};
const money2=n=>{n=+n||0;return (n<0?'-$':'$')+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})};
const signCls=n=>(+n||0)<0?'neg':(+n||0)>0?'pos':'';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const fdate=s=>{if(!s)return'';const d=new Date(s+'T12:00:00');return isNaN(d)?esc(s):d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})};
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
function ov(id,show){$('#'+id).classList.toggle('show',!!show)}

/* ---------------- store ---------------- */
let S={items:{},lastPull:0,lastSyncAt:0};
function load(){try{const j=JSON.parse(localStorage.alfred_state||'{}');if(j&&j.items)S=j}catch(e){}}
function save(){localStorage.alfred_state=JSON.stringify(S)}
function put(sec,d,id){
  const it=S.items[id]||{id:id||uid(),sec,d:{}};
  it.sec=sec; it.d=Object.assign({},it.d,d); it.up=Date.now(); it.dirty=1; delete it.del;
  S.items[it.id]=it; save(); queueSync(); return it;
}
function kill(id){const it=S.items[id];if(!it)return;it.del=true;it.up=Date.now();it.dirty=1;save();queueSync()}
function list(sec){return Object.values(S.items).filter(i=>i.sec===sec&&!i.del)}
function one(id){const i=S.items[id];return (i&&!i.del)?i:null}

/* ---------------- sync ---------------- */
let cfg=null; try{cfg=JSON.parse(localStorage.alfred_cfg||'null')}catch(e){}
async function sb(path,opt={}){
  const r=await fetch(cfg.url.replace(/\/$/,'')+'/rest/v1/'+path,{...opt,
    headers:Object.assign({apikey:cfg.key,Authorization:'Bearer '+cfg.key,'Content-Type':'application/json'},cfg.secret?{'x-alfred-key':cfg.secret}:{},opt.headers||{})});
  if(!r.ok)throw new Error(r.status+' '+await r.text());
  const t=await r.text(); return t?JSON.parse(t):null;
}
let syncTimer=null,syncing=false,again=false;
function queueSync(){setPill();clearTimeout(syncTimer);syncTimer=setTimeout(sync,900)}
async function sync(){
  if(!cfg||!navigator.onLine){setPill();return}
  if(syncing){again=true;return}
  syncing=true;setPill('sync');
  let changed=false;
  try{
    const rows=await sb(`items?select=*&up=gt.${S.lastPull||0}&order=up.asc&limit=1000`);
    for(const r of rows){
      const l=S.items[r.id];
      if(!l||+r.up>l.up){S.items[r.id]={id:r.id,sec:r.sec,d:r.data||{},up:+r.up,...(r.del?{del:true}:{})};changed=true}
      if(+r.up>(S.lastPull||0))S.lastPull=+r.up;
    }
    const dirty=Object.values(S.items).filter(i=>i.dirty);
    if(dirty.length){
      await sb('items?on_conflict=id',{method:'POST',headers:{Prefer:'resolution=merge-duplicates'},
        body:JSON.stringify(dirty.map(i=>({id:i.id,sec:i.sec,data:i.d||{},up:i.up,del:!!i.del})))});
      dirty.forEach(i=>delete i.dirty);
    }
    S.lastSyncAt=Date.now();save();
    // second device: a PIN pulled from the cloud upgrades the "choose PIN" screen to "enter PIN"
    if(changed&&$('#lock').classList.contains('show')&&pinMode==='set'&&!pinFirst&&pinHash())showLock('enter');
  }catch(e){console.warn('sync failed:',e.message)}
  syncing=false;setPill();
  if(changed)renderActive();
  if(again){again=false;queueSync()}
}
function setPill(state){
  const dot=$('#pillDot'),txt=$('#pillTxt');
  const pend=Object.values(S.items).filter(i=>i.dirty).length;
  if(!cfg){dot.className='dot gray';txt.textContent='local only';return}
  if(state==='sync'){dot.className='dot pend';txt.textContent='syncing…';return}
  if(!navigator.onLine){dot.className='dot off';txt.textContent='offline · saved';return}
  if(pend){dot.className='dot pend';txt.textContent=pend+' pending';return}
  dot.className='dot';txt.textContent=S.lastSyncAt?('cloud · '+new Date(S.lastSyncAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})):'cloud';
}
addEventListener('online',()=>{setPill();sync()});
addEventListener('offline',setPill);
setInterval(()=>{if(document.visibilityState==='visible')sync()},45000);

/* ---------------- PIN ---------------- */
async function hash(p){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('alfred:'+p));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
let pinBuf='',pinMode='enter',pinFirst='',hiddenAt=0;
function pinHash(){return localStorage.alfred_pin||one('cfg:pin')?.d?.h||''}
function showLock(mode){pinMode=mode;pinBuf='';pinFirst='';
  $('#lockMsg').textContent=mode==='set'?'CHOOSE A 4-DIGIT PIN':'ENTER PIN';
  drawDots();$('#lock').classList.add('show')}
function drawDots(){$$('#lockDots .pdot').forEach((d,i)=>d.classList.toggle('on',i<pinBuf.length))}
async function pinDigit(k){
  if(k==='⌫'){pinBuf=pinBuf.slice(0,-1);drawDots();return}
  if(pinBuf.length>=4)return;
  pinBuf+=k;drawDots();
  if(pinBuf.length<4)return;
  const h=await hash(pinBuf);
  if(pinMode==='set'){
    if(!pinFirst){pinFirst=h;pinBuf='';$('#lockMsg').textContent='CONFIRM PIN';setTimeout(drawDots,150);return}
    if(h===pinFirst){localStorage.alfred_pin=h;put('cfg',{h},'cfg:pin');$('#lock').classList.remove('show')}
    else{wrong('PINS DIDN\'T MATCH — START OVER');pinFirst='';$('#lockMsg').textContent='CHOOSE A 4-DIGIT PIN'}
    return;
  }
  if(h===pinHash()){localStorage.alfred_pin=h;$('#lock').classList.remove('show')}
  else wrong('WRONG PIN — TRY AGAIN');
}
function wrong(msg){const d=$('#lockDots');d.classList.add('shake');$('#lockMsg').textContent=msg;setTimeout(()=>{d.classList.remove('shake');pinBuf='';drawDots()},380)}
function initPad(){const pad=$('#lockPad');'123456789 0⌫'.split('').forEach(k=>{
  const b=document.createElement('button');b.className='pkey'+(k===' '?' ghost':'');b.textContent=k===' '?'':k;
  if(k!==' ')b.onclick=()=>pinDigit(k);pad.appendChild(b)})}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden')hiddenAt=Date.now();
  else{sync();if(pinHash()&&hiddenAt&&Date.now()-hiddenAt>5*60*1000)showLock('enter')}
});

/* ---------------- field/form engine ---------------- */
const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function fmtT(s){if(!s)return'';const[h,m]=String(s).split(':').map(Number);if(isNaN(h))return esc(String(s));const ap=h>=12?'PM':'AM';return(((h+11)%12)+1)+':'+String(m||0).padStart(2,'0')+' '+ap}
function fieldHtml(f,v){
  v=v??(typeof f.def==='function'?f.def():f.def)??'';
  const base=`id="f_${f.k}"`;
  if(f.t==='ta')return`<textarea ${base} placeholder="${esc(f.ph||'')}">${esc(v)}</textarea>`;
  if(f.t==='sel')return`<select ${base}>${f.opt.map(o=>`<option ${o===v?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  if(f.t==='check')return`<select ${base}><option value="">No</option><option value="1" ${v?'selected':''}>Yes</option></select>`;
  if(f.t==='days'){const sel=String(v||'').split(',').map(s=>s.trim());
    return`<div class="dayPick" ${base}>`+DOW.map(d=>`<button type="button" class="dayBtn ${sel.includes(d)?'on':''}" data-d="${d}">${d}</button>`).join('')+`</div>`}
  const type=f.t==='num'||f.t==='money'?'number':f.t==='date'?'date':f.t==='time'?'time':'text';
  const step=f.t==='money'?'step="any" inputmode="decimal"':f.t==='num'?'inputmode="numeric"':'';
  return`<input ${base} type="${type}" ${step} value="${esc(v)}" placeholder="${esc(f.ph||'')}">`;
}
let editCtx=null;
function openForm(sec,id,defs){
  const m=MODS[sec];if(!m||!m.fields)return;
  const it=id?one(id):null;
  editCtx={sec,id};
  $('#mTitle').textContent=(it?'Edit — ':'Add — ')+m.title;
  $('#mBody').innerHTML='<div class="frow'+(m.fields.length<2?' one':'')+'">'+
    m.fields.map(f=>{let v=it?.d?.[f.k]??defs?.[f.k];if(m.formIn&&it)v=m.formIn(it,f.k,v);
      return`<div class="field" ${f.full?'style="grid-column:1/-1"':''}><label>${esc(f.l)}</label>${fieldHtml(f,v)}</div>`}).join('')+'</div>';
  $('#mDel').style.display=it?'':'none';
  $('#mBody').querySelectorAll('.dayBtn').forEach(b=>b.onclick=()=>b.classList.toggle('on'));
  ov('modalOv',1);
  const first=$('#mBody input,#mBody textarea');if(first&&!('ontouchstart'in window))first.focus();
}
function closeModal(){ov('modalOv',0);editCtx=null}
$('#mSave').onclick=()=>{
  if(!editCtx)return;
  const m=MODS[editCtx.sec],d={};
  for(const f of m.fields){
    let v;
    if(f.t==='days')v=[...$('#f_'+f.k).querySelectorAll('.dayBtn.on')].map(b=>b.dataset.d).join(',');
    else{v=$('#f_'+f.k).value.trim();
      if(f.t==='num'||f.t==='money')v=v===''?'':+v;
      if(f.t==='check')v=v?1:'';}
    d[f.k]=v;
  }
  const req=m.fields.find(f=>f.req&&!d[f.k]);
  if(req){$('#f_'+req.k).style.borderColor='var(--bad)';return}
  if(m.formOut)m.formOut(d);
  put(editCtx.sec,d,editCtx.id);
  closeModal();renderActive();
};
$('#mDel').onclick=()=>{if(editCtx?.id&&confirm('Delete this item?')){kill(editCtx.id);closeModal();renderActive()}};
$('#modalOv').addEventListener('click',e=>{if(e.target.id==='modalOv')closeModal()});

/* ---------------- generic list page ---------------- */
const chipState={};
function genList(sec){
  const m=MODS[sec];
  let items=list(sec);
  const chips=m.chips;
  let html='';
  if(m.stats){html+='<div class="grid stats">'+m.stats(items).map(s=>`<div class="stat" style="--accent:${s.c||'var(--acc)'}"><div class="k">${s.k}</div><div class="v">${s.v}</div>${s.u?`<div class="u">${s.u}</div>`:''}</div>`).join('')+'</div>'}
  html+=`<div class="panel"><h2><span class="sw" style="background:${m.color||'var(--acc)'}"></span>${m.title}</h2><div class="hint">${m.hint||''}</div>`;
  if(chips){
    const cur=chipState[sec]??0;
    html+='<div class="segbar">'+chips.map((c,i)=>`<button class="${i===cur?'active':''}" onclick="chipState['${sec}']=${i};renderActive()">${c.l}</button>`).join('')+'</div>';
    items=items.filter(chips[cur].f);
  }
  if(m.sort)items.sort(m.sort);
  if(!items.length)html+=`<div class="empty">${m.empty||'Nothing here yet — hit the + button.'}</div>`;
  else if(m.group){
    const gs={};items.forEach(i=>{(gs[m.group(i)]=gs[m.group(i)]||[]).push(i)});
    for(const g of Object.keys(gs).sort(m.groupOrder))html+=`<div class="ghead">${esc(g)}<span class="gsub">${gs[g].length}</span></div>`+gs[g].map(i=>rowHtml(sec,i)).join('');
  }
  else html+=items.map(i=>rowHtml(sec,i)).join('');
  html+='</div>';
  return html;
}
function detailHtml(sec,i){
  const m=MODS[sec];if(!m||!m.fields)return'';
  const tas=m.fields.filter(f=>f.t==='ta');
  const parts=[];
  tas.forEach(f=>{const v=String(i.d[f.k]||'').trim();
    if(v)parts.push((tas.length>1?`<div class="rDetL">${esc(f.l)}</div>`:'<div class="rDetL"></div>')+`<div class="rDetB">${esc(v)}</div>`)});
  return parts.join('');
}
function toggleDet(el){el.closest('.rowBox').classList.toggle('open')}
function rowHtml(sec,i){
  const m=MODS[sec],c=m.card(i);
  const doneKey=m.toggle, isDone=doneKey?!!i.d[doneKey.k||doneKey]:false;
  const det=detailHtml(sec,i);
  return`<div class="rowBox ${c.dim?'dim':''}">
    <div class="row" onclick="${det?'toggleDet(this)':`openForm('${sec}','${i.id}')`}">
    ${doneKey?`<span class="chk ${isDone?'done':''}" onclick="event.stopPropagation();togg('${sec}','${i.id}')">✓</span>`:''}
    <div class="rinfo"><div class="t">${c.t}</div>${c.s?`<div class="s">${c.s}</div>`:''}</div>
    <div class="rright">${c.step?stepHtml(i,c.step):''}${c.pill?`<span class="pill ${c.pill.cls}">${c.pill.txt}</span>`:''}${det?'<span class="chev">▾</span>':''}<button class="editBtn" title="Edit" onclick="event.stopPropagation();openForm('${sec}','${i.id}')">✎</button></div>
    </div>
    ${det?`<div class="rDet">${det}</div>`:''}
  </div>`;
}
function stepHtml(i,k){return`<span class="qtyStep" onclick="event.stopPropagation()">
  <button class="qtyBtn" onclick="bump('${i.id}','${k}',-1)">−</button>
  <span class="qtyVal">${+i.d[k]||0}</span>
  <button class="qtyBtn" onclick="bump('${i.id}','${k}',1)">+</button></span>`}
function bump(id,k,dn){const i=one(id);if(!i)return;const v=Math.max(0,(+i.d[k]||0)+dn);put(i.sec,{[k]:v},id);renderActive()}
function togg(sec,id){
  const m=MODS[sec],i=one(id);if(!i)return;
  if(typeof m.onToggle==='function'){m.onToggle(i)}
  else{const k=m.toggle.k||m.toggle;put(sec,{[k]:i.d[k]?'':1},id)}
  renderActive();
}

/* ---------------- module definitions ---------------- */
const ST_SEL=['Idea','Planned','In progress','Done'];
const MODS={
briefs:{title:'Journal',color:'var(--acc)',hint:'Quick notes for the day — what matters, what happened.',
  fields:[{k:'date',l:'Date',t:'date',def:'',req:1},{k:'txt',l:'Brief',t:'ta',full:1,req:1,ph:'What matters today…'}],
  sort:(a,b)=>(b.d.date||'').localeCompare(a.d.date||''),
  card:i=>({t:fdate(i.d.date),s:esc((i.d.txt||'').slice(0,140))}),
  empty:'No briefs yet. Tap + to write today\'s.'},
todo:{title:'To-do list',color:'#ff6b6b',hint:'Check things off as you go.',
  fields:[{k:'task',l:'Task',t:'text',req:1},{k:'due',l:'Due',t:'date'},{k:'notes',l:'Notes',t:'ta',full:1}],
  chips:[{l:'Open',f:i=>!i.d.done},{l:'Done',f:i=>i.d.done},{l:'All',f:()=>1}],
  toggle:'done',
  sort:(a,b)=>(a.d.done?1:0)-(b.d.done?1:0)||(a.d.due||'9999').localeCompare(b.d.due||'9999'),
  card:i=>({t:esc(i.d.task),s:[i.d.due?'due '+fdate(i.d.due):'',esc(i.d.notes||'')].filter(Boolean).join(' · '),dim:!!i.d.done,
    pill:i.d.due&&!i.d.done&&i.d.due<today()?{cls:'bad',txt:'overdue'}:null})},
fincash:{title:'Cash — accounts',color:'var(--green)',hint:'',
  fields:[{k:'name',l:'Account',t:'text',req:1},{k:'grp',l:'Section',t:'sel',opt:['Banking','Credit','FICO','Haiti cash','Haiti credit','Setting']},{k:'amt',l:'Amount / score',t:'money'},{k:'cur',l:'Currency',t:'sel',opt:['USD','HTG']},{k:'stmt',l:'Statement date',t:'date'},{k:'due',l:'Due date',t:'date'}],
  formIn:(it,k,v)=>(k==='amt'&&(it?.d?.grp==='Credit'||it?.d?.grp==='Haiti credit')&&v!==''&&v!=null)?Math.abs(+v||0):v,
  formOut:d=>{if((d.grp==='Credit'||d.grp==='Haiti credit')&&d.amt!==''&&d.amt!=null)d.amt=-Math.abs(+d.amt);return d}},
finstmt:{title:'Monthly statement',color:'var(--blue)',hint:'',
  fields:[{k:'month',l:'Month',t:'sel',opt:MONTHS,req:1,def:()=>MONTHS[new Date().getMonth()]},{k:'src',l:'Card / source',t:'sel',opt:['Citibank CC','Amex CC','Wells Fargo CC','BUH'],def:()=>finView==='Haitian'?'BUH':'Citibank CC'},{k:'amt',l:'Amount paid',t:'money'}]},
fintx:{title:'Transfer',color:'var(--purple)',hint:'',
  fields:[{k:'month',l:'Month',t:'sel',opt:MONTHS,req:1,def:()=>MONTHS[new Date().getMonth()]},{k:'desc',l:'What / who',t:'text',ph:'optional'},{k:'acct',l:'Bank side',t:'sel',opt:['American','Haitian'],def:()=>finView},{k:'cur',l:'Currency',t:'sel',opt:['USD','HTG'],def:'USD'},{k:'dir',l:'Direction',t:'sel',opt:['Out','In'],def:'Out'},{k:'amt',l:'Amount',t:'money',req:1}],
  formIn:(it,k,v)=>k==='amt'?Math.abs(+v||0):k==='dir'?((+it.d.amt||0)>=0?'In':'Out'):v,
  formOut:d=>{d.amt=(d.dir==='In'?1:-1)*Math.abs(+d.amt||0);delete d.dir;if(d.acct!=='Haitian')d.cur='USD';return d}},
finsub:{title:'Subscriptions',color:'var(--orange)',hint:'Tap a subscription to edit it — totals update themselves.',
  fields:[{k:'name',l:'Subscription',t:'text',req:1},{k:'cycle',l:'Billing',t:'sel',opt:['Monthly','Yearly']},{k:'cost',l:'Cost',t:'money',req:1},{k:'bank',l:'Paid from',t:'text',ph:'Wells Fargo CC…'},{k:'notes',l:'Concerns / notes',t:'ta',full:1}],
  group:i=>i.d.cycle||'Monthly',
  groupOrder:(a,b)=>(a==='Monthly'?0:1)-(b==='Monthly'?0:1),
  sort:(a,b)=>(+b.d.cost||0)-(+a.d.cost||0),
  stats:it=>{const mo=it.filter(i=>i.d.cycle!=='Yearly').reduce((s,i)=>s+(+i.d.cost||0),0);
    const yr=it.filter(i=>i.d.cycle==='Yearly').reduce((s,i)=>s+(+i.d.cost||0),0);
    return[{k:'Monthly subs',v:money2(mo),c:'var(--orange)'},{k:'Yearly subs',v:money2(yr),u:'≈ '+money2(yr/12)+' / month',c:'var(--blue)'},{k:'All-in / month',v:money2(mo+yr/12),c:'var(--acc)'}]},
  card:i=>({t:esc(i.d.name),s:[esc(i.d.bank||''),esc(i.d.notes||'')].filter(Boolean).join(' · '),
    pill:{cls:'acc',txt:money2(i.d.cost)+(i.d.cycle==='Yearly'?'/yr':'/mo')}})},
payroll:{title:'Payroll — house staff',color:'var(--green)',hint:'Tap the circle when someone is paid — it resets each month.',
  fields:[{k:'name',l:'Name',t:'text',req:1},{k:'role',l:'Role',t:'text'},{k:'amt',l:'Salary / month',t:'money'},{k:'payday',l:'Pay day (1–31)',t:'num'},{k:'notes',l:'Notes',t:'ta',full:1}],
  stats:it=>[{k:'Monthly payroll',v:money(it.reduce((s,i)=>s+(+i.d.amt||0),0)),c:'var(--green)'},{k:'Staff',v:it.length},
    {k:'Paid this month',v:it.filter(i=>paidThis(i)).length+' / '+it.length,c:'var(--acc)'}],
  toggle:{k:'lastPaid'},
  onToggle:i=>put('payroll',{lastPaid:paidThis(i)?'':today()},i.id),
  sort:(a,b)=>(a.d.name||'').localeCompare(b.d.name||''),
  card:i=>{const p=paidThis(i);return{t:esc(i.d.name),s:[esc(i.d.role||''),(i.d.amt!==''&&i.d.amt!=null)?money(i.d.amt)+'/mo':'',i.d.payday?'pays day '+i.d.payday:''].filter(Boolean).join(' · '),
    pill:p?{cls:'ok',txt:'paid'}:{cls:'warn',txt:'due'},dim:false}},
  empty:'Add your house staff with + — salary, role, pay day.'},
bdays:{title:'Birthdays',color:'var(--purple)',hint:'Never miss one.',

function paidThis(i){const lp=i.d.lastPaid||'';return lp.slice(0,7)===today().slice(0,7)}
function nextBday(s){const d=daysToBday(s);return d==null?9999:d}
function daysToBday(s){if(!s)return null;const now=new Date();const [y,m,dd]=s.split('-').map(Number);if(!m)return null;
  let b=new Date(now.getFullYear(),m-1,dd);const t0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if(b<t0)b=new Date(now.getFullYear()+1,m-1,dd);return Math.round((b-t0)/864e5)}
function actToday(i){const w=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];const ds=i.d.days||'';
  if(ds.split(',').map(x=>x.trim()).includes(w))return true;
  if(ds.includes('–')){const seq=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];const[a,b]=ds.split(/–/).map(x=>x.trim().slice(0,3));
    const ia=seq.indexOf(a),ib=seq.indexOf(b),iw=seq.indexOf(w);return ia>=0&&ib>=0&&iw>=ia&&iw<=ib}
  return false}

function finBy(grp){return list('fincash').filter(i=>(i.d.grp||'')===grp)}

function finStats(bt,ct,ov,u){return `<div class="grid stats">

    <div class="stat" style="--accent:var(--red)"><div class="k">Credit</div><div class="v">${money2(ct)}</div>${u?`<div class="u">${u}</div>`:''}</div></div>`}
function fincashPage(){

  }else{

function stmtCell(src,mn){const it=list('finstmt').find(i=>i.d.src===src&&i.d.month===mn);openForm('finstmt',it?.id,{src,month:mn})}
function finstmtPage(){

    const txm={},txn={};list('fintx').filter(i=>(i.d.acct||'American')==='American').forEach(i=>{txm[i.d.month]=(txm[i.d.month]||0)+(+i.d.amt||0);txn[i.d.month]=(txn[i.d.month]||0)+1});

    h+=`<tr class="tot"><td>Year</td>${srcs.map(s=>{const t=its.filter(i=>i.d.src===s).reduce((x,i)=>x+(+i.d.amt||0),0);return`<td>${t?money2(t):'·'}</td>`}).join('')}<td class="${signCls(txYear)}">${txAny?money2(txYear):'·'}</td><td>${money2(grand)}</td></tr>`;

  }else{

    h+=`<div class="panel"><h2><span class="sw" style="background:var(--blue)"></span>Monthly statements — 2026 (Haiti)</h2>

    <div class="ftWrap"><table class="ft"><tr><th>Month</th><th>BUH card (HTG)</th><th>Transfers ($)</th><th>Transfers (HTG)</th><th>Total ($)</th></tr>`;
    let grand=0;
    MONTHS.forEach(mn=>{
      const it=byKey[mn];const buh=it?(+it.d.amt||0):null;
      const hasU=!!txUn[mn],hasH=!!txHn[mn];
      const tu=hasU?-txU[mn]:0, th=hasH?-txH[mn]:0;

    });
    const yb=its.reduce((s,i)=>s+(+i.d.amt||0),0);
    const yu=-Object.values(txU).reduce((a,b)=>a+b,0), yh=-Object.values(txH).reduce((a,b)=>a+b,0);
    const yuAny=Object.keys(txUn).length>0, yhAny=Object.keys(txHn).length>0;
    h+=`<tr class="tot"><td>Year</td><td>${yb?yb.toLocaleString('en-US')+' HTG':'·'}</td><td class="${signCls(yu)}">${yuAny?money2(yu):'·'}</td><td class="${signCls(yh)}">${yhAny?(yh||0).toLocaleString('en-US')+' HTG':'·'}</td><td>${money2(grand)}</td></tr></table></div></div>`;
  }
  return h;
}
function fintxPage(){
  const rateItem=finBy('Setting')[0];const rate=(+rateItem?.d?.amt)||131;
  const its=list('fintx').filter(i=>(i.d.acct||'American')===finView);
  const usdVal=i=>i.d.cur==='HTG'?(+i.d.amt||0)/rate:(+i.d.amt||0);
  const by={};its.forEach(i=>{(by[i.d.month]=by[i.d.month]||[]).push(i)});
  const months=MONTHS.filter(m=>by[m]);
  const txrow=i=>`<div class="finRow" onclick="openForm('fintx','${i.id}')"><span class="n">${esc(i.d.desc||'Transfer')}</span>${i.d.cur==='HTG'?`<span class="v2" style="margin-left:auto">= ${money2(usdVal(i))}</span><span class="v ${signCls(i.d.amt)}" style="margin-left:0">${(+i.d.amt||0).toLocaleString('en-US')} HTG</span>`:`<span class="v ${signCls(i.d.amt)}">${money2(i.d.amt)}</span>`}</div>`;
  let h=finSeg();
  h+=`<div class="panel"><h2><span class="sw" style="background:var(--purple)"></span>Transfers — 2026 (${finView==='American'?'US':'Haiti'})</h2>
  <div class="hint">${finView==='American'?'Your US banks together (Citi, Wells Fargo, Amex).':'BUH — USD and HTG separated; HTG converts at '+rate+' HTG / USD.'} In / Out / Net compute themselves; + logs a transfer.</div>
  ${months.length?'':'<div class="empty">No '+finView.toLowerCase()+' transfers logged yet.</div>'}</div>`;
  [...months].reverse().forEach(mn=>{
    const rows=by[mn];
    const inn=rows.filter(i=>usdVal(i)>0).reduce((s,i)=>s+usdVal(i),0);
    const out=rows.filter(i=>usdVal(i)<0).reduce((s,i)=>s+usdVal(i),0);
    const head=`<h2 style="justify-content:space-between;flex-wrap:wrap">${mn}<span style="font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);font-weight:400">In <span class="pos">${money2(inn)}</span> · Out <span class="neg">${money2(out)}</span> · Net <span class="${signCls(inn+out)}">${money2(inn+out)}</span></span></h2>`;
    if(finView==='American'){h+=`<div class="panel">${head}${rows.map(txrow).join('')}</div>`}
    else{const ru=rows.filter(i=>i.d.cur!=='HTG'),rh=rows.filter(i=>i.d.cur==='HTG');
      h+=`<div class="panel">${head}${ru.length?`<div class="ghead">USD<span class="gsub">${ru.length}</span></div>`+ru.map(txrow).join(''):''}${rh.length?`<div class="ghead">HTG<span class="gsub">${rh.length}</span></div>`+rh.map(txrow).join(''):''}</div>`}
  });
  return h;
}
function networthPage(){
  const bank=finSum('Banking'),cc=finSum('Credit'),net=bank+cc;
  const assets=list('assets');
  const atot=assets.reduce((s,i)=>s+(+i.d.val||0),0);
  let h=`<div class="grid stats">
    <div class="stat ovCard" onclick="go('fincash')" style="--accent:var(--green)"><div class="k">Cash</div><div class="v">${money2(bank)}</div><div class="u">live from Finances → Cash</div></div>
    <div class="stat ovCard" onclick="go('fincash')" style="--accent:var(--red)"><div class="k">Credit</div><div class="v">${money2(cc)}</div><div class="u">live from Finances → Cash</div></div>
    <div class="stat" style="--accent:var(--blue)"><div class="k">Net cash</div><div class="v">${money2(net)}</div></div>
    <div class="stat" style="--accent:var(--acc)"><div class="k">Assets</div><div class="v">${money2(atot)}</div></div>
    <div class="stat" style="--accent:var(--acc)"><div class="k">Net worth</div><div class="v">${money2(net+atot)}</div></div>
  </div>`;
  h+=genList('assets');
  return h;
}
function toMin(s){if(!s)return null;const[p,q]=String(s).split(':').map(Number);return isNaN(p)?null:p*60+(q||0)}
function schedulePage(){
  const acts=list('acts');
  const T0=6*60,T1=22*60,SLOT=30,rows=(T1-T0)/SLOT;
  const todayIdx=(new Date().getDay()+6)%7;
  const cols=['var(--green)','var(--blue)','var(--orange)','var(--purple)','var(--red)','var(--gold)','var(--acc)'];
  let h=`<div class="panel"><h2><span class="sw" style="background:var(--blue)"></span>Week planner</h2>
  <div class="hint">Drawn from your activities below — tap a block to edit it.</div>
  <div class="ttWrap"><div class="tt" style="grid-template-rows:22px repeat(${rows},13px)">`;
  h+=`<span></span>`+DOW.map((d,i)=>`<div class="ttHead ${i===todayIdx?'today':''}" style="grid-column:${i+2};grid-row:1">${d}</div>`).join('');
  for(let mn=T0;mn<T1;mn+=60){const r=2+(mn-T0)/SLOT;
    h+=`<div class="ttTime" style="grid-row:${r}">${fmtT(String(Math.floor(mn/60)).padStart(2,'0')+':00')}</div>`;
    for(let c=2;c<=8;c++)h+=`<div class="ttCell" style="grid-column:${c};grid-row:${r} / span 2"></div>`;
  }
  let ci=0,placed=0;
  acts.forEach(a=>{
    const st=toMin(a.d.start);
    const color=cols[ci++%cols.length];
    if(st==null||!a.d.days)return;
    const en=toMin(a.d.end)!=null?toMin(a.d.end):st+60;
    (a.d.days||'').split(',').map(x=>x.trim()).forEach(dn=>{
      const di=DOW.indexOf(dn);if(di<0)return;
      const r1=Math.min(rows+1,Math.max(2,2+Math.round((st-T0)/SLOT)));
      const span=Math.max(1,Math.min(rows+2-r1,Math.round((en-st)/SLOT)));
      h+=`<div class="ttBlock" style="grid-column:${di+2};grid-row:${r1} / span ${span};--bc:${color}" onclick="openForm('acts','${a.id}')"><div class="n">${esc(a.d.name)}</div><div class="t">${fmtT(a.d.start)}${a.d.end?'–'+fmtT(a.d.end):''}</div></div>`;
      placed++;
    });
  });
  h+=`</div></div>`;
  if(!placed)h+=`<div class="empty">Give your activities days and a start time and they appear here.</div>`;
  h+=`</div>`;
  h+=genList('acts');
  return h;
}
function briefPage(){
  const bs=list('brief').sort((a,b)=>(b.d.date||'').localeCompare(a.d.date||''));
  let h=`<div class="panel"><h2><span class="sw" style="background:var(--gold)"></span>Daily brief</h2>
  <div class="hint">Your Economist-style morning brief, posted automatically by your Claude agent. Use + to write one by hand.</div>
  ${bs.length?'':'<div class="empty">No briefs yet — the agent posts every morning.</div>'}</div>`;
  bs.forEach(b=>{h+=`<div class="panel"><h2 style="justify-content:space-between">${fdate(b.d.date)}<button class="btn sm ghost" onclick="openForm('brief','${b.id}')">Edit</button></h2>
    ${b.d.title?`<div style="font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:16px;margin-top:6px">${esc(b.d.title)}</div>`:''}
    <div class="briefBody">${esc(b.d.body||'')}</div></div>`});
  return h;
}
function overviewPage(){
  const t=today();
  const dateline=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  let h=`<div class="ovHead">${dateline}</div><div class="ovSub">The day at a glance — tap a card to open its page</div>`;
  const briefs=list('brief').sort((a,b)=>(b.d.date||'').localeCompare(a.d.date||''));
  const b=briefs[0];
  h+=`<div class="panel ovCard" onclick="go('brief')"><h2><span class="sw" style="background:var(--gold)"></span>Daily brief</h2>`;
  if(b)h+=`<div class="hint">${fdate(b.d.date)}${b.d.title?' — '+esc(b.d.title):''}</div><div class="ovBody">${esc(b.d.body||'')}</div><div class="ovMore">Read the full brief →</div>`;
  else h+=`<div class="empty" style="padding:16px">No brief yet — your agent posts here every morning.</div>`;
  h+=`</div>`;
  const tds=list('todo').filter(i=>!i.d.done&&i.d.due&&i.d.due<=t).sort((a,b)=>(a.d.due||'').localeCompare(b.d.due||''));
  h+=`<div class="panel ovCard" onclick="go('todo')"><h2><span class="sw" style="background:#b8543f"></span>To-do today</h2>`;
  if(tds.length)h+=tds.slice(0,6).map(i=>`<div class="ovRow"><span class="d ${i.d.due<t?'hot':''}">${i.d.due<t?'overdue':'today'}</span><span>${esc(i.d.task)}</span></div>`).join('')+(tds.length>6?`<div class="ovMore">+${tds.length-6} more →</div>`:'');
  else h+=`<div class="empty" style="padding:16px">Nothing due today.</div>`;
  h+=`</div>`;
  const acts=list('acts').filter(actToday);
  if(acts.length)h+=`<div class="panel ovCard" onclick="go('schedule')"><h2><span class="sw" style="background:var(--green)"></span>Today's activities</h2>${acts.map(i=>`<div class="ovRow"><span class="d">${fmtT(i.d.start)||'—'}</span><span>${esc(i.d.name)}</span></div>`).join('')}</div>`;
  const low=list('stock').filter(i=>(+i.d.count||0)<=(+i.d.min||0));
  if(low.length)h+=`<div class="panel ovCard" onclick="go('stock')"><h2><span class="sw" style="background:var(--orange)"></span>Stock running low</h2>${low.slice(0,5).map(i=>`<div class="ovRow"><span class="d">${+i.d.count||0} left</span><span>${esc(i.d.name)}</span></div>`).join('')}</div>`;
  const pd=list('payroll').filter(i=>!paidThis(i));
  if(pd.length)h+=`<div class="panel ovCard" onclick="go('payroll')"><h2><span class="sw" style="background:var(--green)"></span>Payroll — ${pd.length} to pay</h2>${pd.slice(0,5).map(i=>`<div class="ovRow"><span class="d">${i.d.payday?'day '+i.d.payday:''}</span><span>${esc(i.d.name)}${i.d.amt?' · '+money(i.d.amt):''}</span></div>`).join('')}</div>`;
  const tr=list('travels').filter(i=>i.d.start&&i.d.start>=t).sort((a,b)=>a.d.start.localeCompare(b.d.start))[0];
  if(tr)h+=`<div class="panel ovCard" onclick="go('travels')"><h2><span class="sw" style="background:var(--blue)"></span>Next trip</h2><div class="ovRow"><span class="d">${fdate(tr.d.start)}</span><span>${esc(tr.d.place)}</span></div></div>`;
  const bd=list('bdays').map(i=>({i,dd:daysToBday(i.d.date)})).filter(x=>x.dd!=null&&x.dd<=14).sort((a,b)=>a.dd-b.dd);
  if(bd.length)h+=`<div class="panel ovCard" onclick="go('bdays')"><h2><span class="sw" style="background:var(--purple)"></span>Birthdays coming up</h2>${bd.map(x=>`<div class="ovRow"><span class="d">${x.dd===0?'today!':'in '+x.dd+'d'}</span><span>${esc(x.i.d.name)}</span></div>`).join('')}</div>`;
  return h;
}

/* ---------------- nav / pages ---------------- */
const NAV=[
  {t:'Overview',p:'overview'},
  {t:'Brief',p:'brief'},
  {t:'To-do',p:'todo',cls:'todo'},
  {t:'Journal',p:'briefs'},
  {t:'Nutrition',g:[['Home menu','menu'],['Food recipes','food'],['Juice recipes','juice']]},
  {t:'Stock',p:'stock'},
  {t:'Orders',g:[['Necessities','needs'],['Spoils & wants','wants']]},
  {t:'Staff',g:[['Payroll','payroll'],['Birthdays','bdays']]},
  {t:'Finances',g:[['Cash','fincash'],['Statements','finstmt'],['Transfers','fintx'],['Subscriptions','finsub']]},
  {t:'Net worth',p:'networth'},
  {t:'Schedule',p:'schedule'},
  {t:'Timeline',g:[['Travels','travels'],['Spoils','tlspoils']]},
  {t:'Entertainment',g:[['Shows','shows'],['Movies','movies']]},
  {t:'Learnings',g:[['Books','books'],['To learn','courses']]},
  {t:'Projects',p:'projects'},
];
const SPECIAL={overview:{render:overviewPage,fab:null},
  brief:{render:briefPage,fab:'brief'},
  networth:{render:networthPage,fab:'assets'},
  fincash:{render:fincashPage,fab:'fincash'},
  finstmt:{render:finstmtPage,fab:'finstmt'},
  fintx:{render:fintxPage,fab:'fintx'},
  schedule:{render:schedulePage,fab:'acts'}};
let activePage=localStorage.alfred_page||'overview';
function initNav(){
  const nav=$('#nav');nav.innerHTML='';
  NAV.forEach(n=>{
    if(n.p){const b=document.createElement('button');b.textContent=n.t;b.dataset.p=n.p;if(n.cls)b.className=n.cls;
      b.onclick=()=>{closeMenus();go(n.p)};nav.appendChild(b)}
    else{const g=document.createElement('div');g.className='navGroup';
      g.dataset.pages=n.g.map(x=>x[1]).join(',');
      g.innerHTML=`<button class="navGroupBtn">${n.t} <span class="navCaret">▾</span></button>`;
      const gb=g.querySelector('.navGroupBtn');
      gb.onclick=e=>{e.stopPropagation();
        if(Date.now()-flyStamp<400&&g.classList.contains('open'))return; // duplicate synthetic tap
        const was=g.classList.contains('open');closeMenus();
        if(!was){openFly(n.g,g,gb);flyStamp=Date.now()}};
      nav.appendChild(g)}
  });
  document.addEventListener('click',closeMenus);
  document.addEventListener('touchstart',e=>{if(!e.target.closest('.navGroup,#navFly'))closeMenus()},{passive:true});
  nav.addEventListener('scroll',closeMenus);
  const pages=$('#pages');
  const allPages=[...NAV.flatMap(n=>n.p?[n.p]:n.g.map(x=>x[1]))];
  pages.innerHTML=allPages.map(p=>`<section class="page" id="pg-${p}"></section>`).join('');
}
let flyStamp=0;
function openFly(items,groupEl,btn){
  // menu floats on <body>, outside the scrollable nav — iOS clips fixed elements inside touch scrollers
  const fly=$('#navFly');
  fly.innerHTML=items.map(x=>`<button data-p="${x[1]}" class="${x[1]===activePage?'active':''}">${x[0]}</button>`).join('');
  fly.querySelectorAll('button').forEach(b=>b.onclick=e=>{e.stopPropagation();closeMenus();go(b.dataset.p)});
  const r=btn.getBoundingClientRect();
  fly.style.position='fixed';
  fly.style.top=(r.bottom+2)+'px';
  fly.style.left=Math.max(8,Math.min(r.left,innerWidth-210))+'px';
  fly.classList.add('show');groupEl.classList.add('open');
}
function closeMenus(){const f=$('#navFly');if(f)f.classList.remove('show');$$('.navGroup').forEach(g=>g.classList.remove('open'))}
function markNav(){
  $$('#nav > button').forEach(b=>b.classList.toggle('active',b.dataset.p===activePage));
  $$('.navGroup').forEach(g=>{
    g.querySelector('.navGroupBtn').classList.toggle('on',(g.dataset.pages||'').split(',').includes(activePage));
  });
}
function go(p){activePage=p;localStorage.alfred_page=p;renderActive()}
function renderActive(){
  $$('.page').forEach(pg=>pg.classList.remove('active'));
  const el=$('#pg-'+activePage);if(!el)return;
  const sp=SPECIAL[activePage];
  el.innerHTML=sp?sp.render():genList(activePage);
  if(sp?.bind)sp.bind(el);
  el.classList.add('active');
  markNav();
  const fabSec=sp?sp.fab:(MODS[activePage]?.fields?activePage:null);
  $('#fab').style.display=fabSec?'flex':'none';
  $('#fab').onclick=()=>openForm(fabSec);
  setPill();
}

/* ---------------- seeds ---------------- */
const SEED=[]; // personal starter data lives in the private cloud, not in this public file
function seed(){SEED.forEach(([id,sec,d])=>{if(!S.items[id]){S.items[id]={id,sec,d,up:1,dirty:1}}});save()}

/* ---------------- settings ---------------- */
$('#gearBtn').onclick=()=>{
  $('#setSync').textContent=cfg?'configured':'not set up';
  $('#setLast').textContent=S.lastSyncAt?new Date(S.lastSyncAt).toLocaleString():'never';
  $('#setPend').textContent=Object.values(S.items).filter(i=>i.dirty).length;
  $('#setCount').textContent=Object.values(S.items).filter(i=>!i.del).length;
  $('#cfgUrl').value=cfg?.url||'';$('#cfgKey').value=cfg?.key||'';$('#cfgSec').value=cfg?.secret||'';
  ov('setOv',1);
};
$('#setOv').addEventListener('click',e=>{if(e.target.id==='setOv')ov('setOv',0)});
$('#cfgSave').onclick=()=>{
  const url=$('#cfgUrl').value.trim(),key=$('#cfgKey').value.trim(),secret=$('#cfgSec').value.trim();
  if(url&&key){cfg={url,key,secret};localStorage.alfred_cfg=JSON.stringify(cfg);Object.values(S.items).forEach(i=>i.dirty=1);S.lastPull=0;save();sync()}
  else{cfg=null;localStorage.removeItem('alfred_cfg')}
  ov('setOv',0);setPill();
};
$('#pinChange').onclick=()=>{ov('setOv',0);showLock('set')};
$('#expBtn').onclick=()=>{
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(S,null,1));
  a.download='alfred-backup-'+today()+'.json';a.click();
};
$('#impBtn').onclick=()=>$('#impFile').click();
$('#impFile').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const j=JSON.parse(r.result);
    if(!j.items)throw 0;
    for(const id in j.items){const inc=j.items[id],cur=S.items[id];
      if(!cur||inc.up>cur.up){S.items[id]=inc;S.items[id].dirty=1}}
    save();renderActive();sync();alert('Imported.');
  }catch(err){alert('Not a valid Alfred backup.')}};
  r.readAsText(f);
};

/* ---------------- boot ---------------- */
(function(){
  // one-time setup via link fragment: #cfg=base64({url,key})
  if(location.hash.startsWith('#cfg=')){
    try{cfg=JSON.parse(atob(decodeURIComponent(location.hash.slice(5))));
      localStorage.alfred_cfg=JSON.stringify(cfg);
      history.replaceState(null,'',location.pathname+location.search);
    }catch(e){}
  }
  addEventListener('hashchange',()=>{if(location.hash.startsWith('#cfg='))location.reload()});
  load();seed();initNav();initPad();
  if(!MODS[activePage]&&!SPECIAL[activePage])activePage='overview';
  if(!$('#pg-'+activePage))activePage='overview';
  renderActive();
  if(pinHash())showLock('enter');else showLock('set');
  sync();
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();
</script>
